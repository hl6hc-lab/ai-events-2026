  body {

    overflow-x: hidden;

  /* ===== SCROLLBAR ===== */

  #particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    animation: float linear infinite;
    opacity: 0;
  }

  @keyframes float {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
  }

  /* ===== HERO ===== */
  .hero {

  .hero::before {
    content: '';

    top: 50%;

    background: radial-gradient(circle, rgba(139,92,246,0.12) 0%, rgba(0,212,255,0.06) 40%, transparent 70%);

  .weekly-chart {
    display: flex;

    gap: 4px;
    height: 60px;
    padding-top: 0.5rem;

  .week-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;

  .week-label {
    font-size: 0.55rem;
    color: var(--text-muted);
    white-space: nowrap;
  }

  footer {

    -webkit-text-fill-color: transparent;
    background-clip: text;

  /* ===== ANIMATIONS ===== */
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in-up {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .fade-in-up.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .month-divider {

  }

  .month-divider-inner {
    display: inline-flex;

    padding: 0 1.5rem;

    left: 0; right: 0;

  .month-divider-text {
    font-size: 1.1rem;

    -webkit-text-fill-color: transparent;

  .filter-status {
    font-size: 0.75rem;
    color: var(--text-muted);
    padding: 0.2rem 0;
  }

  .filter-status span { color: var(--cyan); font-weight: 600; }

  /* ===== BACK TO TOP ===== */
  #backToTop {
    position: fixed;
    bottom: 2rem;
    right: 2rem;

    border-radius: 50%;

    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(139,92,246,0.4);

  #backToTop:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(139,92,246,0.5); }

  /* ===== HIGHLIGHT SEARCH ===== */
  .highlight {
    background: rgba(0,212,255,0.25);
    border-radius: 2px;
    padding: 0 1px;
  }
</style>
</head>

// ===== CATEGORIZATION =====
const catIcons = {
  "模型发布": "🤖",
  "融资并购": "💰",
  "产品更新": "🚀",
  "政策监管": "📋",
  "研究突破": "🔬"
};

function categorize(text) {
  const t = text;
  if (/融资|收购|投资|估值|轮融资|亿美元|亿元|并购|战略合作协议/.test(t) && !/发布|开源|推出/.test(t.slice(0,5))) {
    if (/融资|收购|估值|轮融资|亿美元|亿元/.test(t)) return "融资并购";
  }
  if (/法案|监管|政策|起诉|制裁|合规|军事|战争部|五角大楼|国防部|立法|禁止|封禁|版权|肖像争议|安全限制|制裁/.test(t)) return "政策监管";
  if (/研究|论文|发现|证明|揭示|基准|报告|调研|指数|趋势报告|技术报告|实证|奠基|经济学|猜想|难题|数学|物理|基因组|药物筛选|评估漏洞|短板|不连贯|去匿名化/.test(t)) return "研究突破";
  if (/发布|开源|上线|推出|亮相/.test(t) && /模型|大模型|LLM|系列模型|语言模型|视觉模型|音频模型|语音模型|图像模型|视频模型|多模态|推理模型|嵌入模型|OCR模型|TTS|ASR|MoE|扩散/.test(t)) return "模型发布";
  if (/融资|收购|投资|估值|轮融资|亿美元|亿元|并购|签约|合作协议/.test(t)) return "融资并购";
  return "产品更新";
}

const starKeywords = ["完成.*融资", "收购", "1100亿", "500亿", "200亿", "百亿", "千亿", "登顶", "满分", "首个", "正式发布", "重大更新", "创纪录", "AGI", "GPT-5", "Claude Opus", "Gemini 3", "GLM-5", "Qwen3", "豆包.*2.0", "Grok 4", "SpaceX.*收购", "战争部", "美军", "火星车"];

function isStar(text) {
  return starKeywords.some(kw => new RegExp(kw).test(text));
}

// ===== WEEKDAY =====
const weekdays = ["日","一","二","三","四","五","六"];
function getWeekday(dateStr) {
  const d = new Date(dateStr);
  return "周" + weekdays[d.getDay()];
}

// ===== MONTH MAPPING =====
function getMonth(dateStr) {
  const m = parseInt(dateStr.split("-")[1]);
  if (m === 1) return "一月";
  if (m === 2) return "二月";
  if (m === 3) return "三月";
  return "";
}

// ===== BUILD TIMELINE =====
let allEventCards = [];
let allDateGroups = [];

function buildTimeline() {
  const container = document.getElementById("timelineContainer");
  let currentMonth = "";
  let totalEvents = 0;

  rawData.forEach((dayData, idx) => {
    const month = getMonth(dayData.date);

    // Month divider
    if (month !== currentMonth) {
      currentMonth = month;
      const divider = document.createElement("div");
      divider.className = "month-divider";
      divider.dataset.month = month;
      divider.innerHTML = `
        <div class="month-divider-line"></div>
        <div class="month-divider-inner">
          <span class="month-divider-icon">${month === "一月" ? "❄️" : month === "二月" ? "🌸" : "🌱"}</span>
          <span class="month-divider-text">2026年${month}</span>
          <span class="month-divider-icon">${month === "一月" ? "❄️" : month === "二月" ? "🌸" : "🌱"}</span>
        </div>
      `;
      container.appendChild(divider);
    }

    const group = document.createElement("div");
    group.className = "date-group fade-in-up";
    group.dataset.date = dayData.date;
    group.dataset.month = month;

    const nodeWrap = document.createElement("div");
    nodeWrap.className = "date-node-wrap";
    nodeWrap.innerHTML = `<div class="date-node">${dayData.date.slice(5)} <span class="weekday">${getWeekday(dayData.date)}</span></div>`;
    group.appendChild(nodeWrap);

    const grid = document.createElement("div");
    grid.className = "events-grid";

    dayData.events.forEach(eventText => {
      const cat = categorize(eventText);
      const star = isStar(eventText);
      const card = document.createElement("div");
      card.className = `event-card cat-${cat}`;
      card.dataset.cat = cat;
      card.dataset.text = eventText;
      card.dataset.month = month;
      card.innerHTML = `
        <div class="event-header">
          <span class="cat-badge ${cat}">${catIcons[cat]} ${cat}</span>
          ${star ? '<span class="star-badge" title="重要事件">⭐</span>' : ''}
        </div>
        <div class="event-text">${eventText}</div>
      `;
      grid.appendChild(card);
      allEventCards.push(card);
      totalEvents++;
    });

    group.appendChild(grid);
    container.appendChild(group);
    allDateGroups.push(group);
  });

  document.getElementById("totalEvents").textContent = totalEvents;
  document.getElementById("totalDates").textContent = rawData.length;
  document.getElementById("footerCount").textContent = totalEvents;

  buildStats(totalEvents);
}

// ===== STATS =====
function buildStats(total) {
  // Category distribution
  const catCounts = { "模型发布": 0, "融资并购": 0, "产品更新": 0, "政策监管": 0, "研究突破": 0 };
  allEventCards.forEach(c => { catCounts[c.dataset.cat]++; });
  const maxCat = Math.max(...Object.values(catCounts));
  const catColors = { "模型发布": "var(--cyan)", "融资并购": "var(--green)", "产品更新": "var(--purple)", "政策监管": "var(--orange)", "研究突破": "var(--pink)" };

  const catDiv = document.getElementById("catDistribution");
  Object.entries(catCounts).sort((a,b) => b[1]-a[1]).forEach(([cat, count]) => {
    const pct = Math.round(count / maxCat * 100);
    catDiv.innerHTML += `
      <div class="cat-dist-item">
        <div class="cat-dist-label">${catIcons[cat]} ${cat}</div>
        <div class="cat-dist-bar-wrap">
          <div class="cat-dist-bar" style="width:${pct}%;background:${catColors[cat]};"></div>
        </div>
        <div class="cat-dist-count">${count}</div>
      </div>
    `;
  });

  // Company mentions
  const companies = {
    "OpenAI": 0, "Anthropic": 0, "Google": 0, "字节跳动": 0, "阿里": 0,
    "Meta": 0, "微软": 0, "英伟达": 0, "xAI": 0, "智谱": 0,
    "腾讯": 0, "月之暗面": 0, "MiniMax": 0, "Cursor": 0, "DeepSeek": 0
  };
  allEventCards.forEach(c => {
    const t = c.dataset.text;
    Object.keys(companies).forEach(co => {
      if (t.includes(co)) companies[co]++;
    });
  });
  const sortedCo = Object.entries(companies).sort((a,b) => b[1]-a[1]).slice(0,10);
  const maxCo = sortedCo[0][1];
  const coDiv = document.getElementById("companyMentions");
  sortedCo.forEach(([co, cnt]) => {
    const pct = Math.round(cnt / maxCo * 100);
    coDiv.innerHTML += `
      <div class="company-item">
        <div class="company-name">${co}</div>
        <div class="company-bar-wrap"><div class="company-bar" style="width:${pct}%"></div></div>
        <div class="company-count">${cnt}</div>
      </div>
    `;
  });

  // Weekly chart
  const weeks = {};
  rawData.forEach(d => {
    const date = new Date(d.date);
    const weekStart = new Date(date);
    weekStart.setDate(date.getDate() - date.getDay());
    const key = `${weekStart.getMonth()+1}/${weekStart.getDate()}`;
    if (!weeks[key]) weeks[key] = 0;
    weeks[key] += d.events.length;
  });
  const weekEntries = Object.entries(weeks);
  const maxW = Math.max(...weekEntries.map(e => e[1]));
  const wDiv = document.getElementById("weeklyChart");
  weekEntries.forEach(([label, cnt]) => {
    const pct = Math.round(cnt / maxW * 100);
    wDiv.innerHTML += `
      <div class="week-bar-wrap">
        <div class="week-bar" style="height:${pct}%"></div>
        <div class="week-label">${label}</div>
      </div>
    `;
  });
}

// ===== FILTERS =====
let activeMonth = "全部";
let activeCat = "全部";
let searchQuery = "";

function applyFilters() {
  let visibleCount = 0;
  let visibleDates = new Set();

  allEventCards.forEach(card => {
    const cardMonth = card.dataset.month;
    const cardCat = card.dataset.cat;
    const cardText = card.dataset.text;

    const monthOk = activeMonth === "全部" || cardMonth === activeMonth;
    const catOk = activeCat === "全部" || cardCat === activeCat;
    const searchOk = searchQuery === "" || cardText.toLowerCase().includes(searchQuery.toLowerCase());

    if (monthOk && catOk && searchOk) {
      card.classList.remove("hidden");
      visibleCount++;
      visibleDates.add(card.closest(".date-group").dataset.date);

      // Highlight search
      const textEl = card.querySelector(".event-text");
      if (searchQuery) {
        const re = new RegExp(`(${searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        textEl.innerHTML = card.dataset.text.replace(re, '<span class="highlight">$1</span>');
      } else {
        textEl.innerHTML = card.dataset.text;
      }
    } else {
      card.classList.add("hidden");
    }
  });

  // Show/hide date groups
  allDateGroups.forEach(group => {
    const visibleCards = group.querySelectorAll(".event-card:not(.hidden)");
    if (visibleCards.length === 0) {
      group.classList.add("hidden");
    } else {
      group.classList.remove("hidden");
    }
  });

  // Show/hide month dividers
  document.querySelectorAll(".month-divider").forEach(div => {
    const m = div.dataset.month;
    const hasVisible = activeMonth === "全部" || activeMonth === m;
    div.style.display = hasVisible ? "" : "none";
  });

  // No results
  const noResults = document.getElementById("noResults");
  noResults.classList.toggle("show", visibleCount === 0);

  // Filter status
  const status = document.getElementById("filterStatus");
  if (activeMonth !== "全部" || activeCat !== "全部" || searchQuery) {
    status.innerHTML = `显示 <span>${visibleCount}</span> 条事件`;
  } else {
    status.innerHTML = "";
  }
}

// Month buttons
document.querySelectorAll("[data-month]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("[data-month]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeMonth = btn.dataset.month;
    applyFilters();
  });
});

// Category buttons
document.querySelectorAll("[data-cat]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("[data-cat]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeCat = btn.dataset.cat;
    applyFilters();
  });
});

// Search
let searchTimer;
document.getElementById("searchInput").addEventListener("input", (e) => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    applyFilters();
  }, 200);
});

// ===== SCROLL ANIMATIONS =====
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("visible");
    }
  });
}, { threshold: 0.05, rootMargin: "0px 0px -50px 0px" });

function observeGroups() {
  document.querySelectorAll(".fade-in-up").forEach(el => observer.observe(el));
}

// ===== BACK TO TOP =====
const backToTop = document.getElementById("backToTop");
window.addEventListener("scroll", () => {
  backToTop.classList.toggle("show", window.scrollY > 500);
});
backToTop.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));

// ===== PARTICLES =====
function createParticles() {
  const container = document.getElementById("particles");
  const colors = ["#00d4ff", "#8b5cf6", "#ec4899", "#10b981"];
  for (let i = 0; i < 40; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    const size = Math.random() * 3 + 1;
    p.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${Math.random() * 100}%;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      animation-duration: ${Math.random() * 15 + 10}s;
      animation-delay: ${Math.random() * 10}s;
      box-shadow: 0 0 ${size * 2}px currentColor;
    `;
    container.appendChild(p);
  }
}

// ===== INIT =====
createParticles();
buildTimeline();
observeGroups();

// Animate stat numbers
function animateNumber(el, target) {
  let current = 0;
  const step = Math.ceil(target / 40);
  const timer = setInterval(() => {
    current = Math.min(current + step, target);
    el.textContent = current;
    if (current >= target) clearInterval(timer);
  }, 30);
}

setTimeout(() => {
  const totalEl = document.getElementById("totalEvents");
  const datesEl = document.getElementById("totalDates");
  animateNumber(totalEl, parseInt(totalEl.textContent));
  animateNumber(datesEl, parseInt(datesEl.textContent));
}, 500);
</script>
